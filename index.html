<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra Practice - Study Module</title>
    <link id="favicon" rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/0/01/El_Sato_Tux_The_penguin_in_sonic_style.png">
    <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #a855f7; --accent: #22c55e; --bg: #020617; --text: #ffffff; --card: rgba(30, 41, 59, 0.5); }
        body { 
            background-color: var(--bg); color: var(--text); font-family: 'Chewy', cursive;
            transition: all 0.3s ease; overflow-x: hidden; min-height: 100vh;
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        #particle-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
        
        .main-logo-container { display: flex; justify-content: center; padding-top: 40px; margin-bottom: -10px; }
        .main-logo { width: 350px; height: auto; filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.4)); cursor: pointer; transition: transform 0.3s ease; }
        .main-logo:hover { transform: scale(1.05); }

        .island-header {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 99px;
            padding: 10px 28px; display: flex; align-items: center; gap: 20px;
            margin: 20px auto 40px; width: fit-content; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-icon { font-size: 1.5rem; cursor: pointer; transition: color 0.2s; opacity: 0.7; }
        .nav-icon:hover { color: var(--accent); opacity: 1; }
        
        .penguin-nav-btn { height: 40px; width: 40px; object-fit: contain; cursor: pointer; transition: filter 0.3s; }
        .penguin-nav-btn:hover { filter: brightness(1.2); }

        .game-card, .sidebar-card {
            position: relative; aspect-ratio: 1/1; overflow: hidden; border-radius: 1.2rem;
            border: 2px solid transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--card); cursor: pointer;
        }
        .game-card:hover, .sidebar-card:hover { border-color: var(--accent); transform: scale(1.03); }
        .game-card img, .sidebar-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-title {
            position: absolute; bottom: -100%; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px 5px 10px; text-align: center; transition: bottom 0.3s ease; font-size: 0.8rem;
        }
        .game-card:hover .card-title, .sidebar-card:hover .card-title { bottom: 0; }

        #settingsPanel { z-index: 100; transition: transform 0.4s ease; }
        .game-container { display: grid; grid-template-columns: 1fr 300px; gap: 20px; height: calc(100vh - 100px); padding: 20px; }
        
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; border: 2px solid var(--bg); }
    </style>
</head>
<body class="p-4">

    <canvas id="particle-canvas"></canvas>

    <div class="main-logo-container">
        <img src="logo.png" alt="Logo" class="main-logo" onclick="location.reload()">

            <button onclick="toggleInfo()" class="mt-8 bg-white/10 px-6 py-2 rounded-full hover:bg-white/20">Close</button>

    </div>

    <div id="settingsPanel" class="fixed top-0 right-0 h-full w-80 bg-slate-900 border-l border-white/10 p-8 transform translate-x-full shadow-2xl overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl">Settings</h2>
            <button onclick="toggleSettings()"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div class="space-y-6">
            <div>
                <label class="block text-xs opacity-50 mb-2 uppercase">Theme Color</label>
                <input type="color" id="primaryPicker" value="#a855f7" oninput="updatePrimary(this.value)" class="w-full h-10 rounded-lg cursor-pointer">
            </div>
            <div class="flex items-center justify-between bg-white/5 p-3 rounded-xl">
                <span>Particles</span>
                <button id="partToggle" onclick="toggleParticles()" class="text-accent">ON</button>
            </div>
            <button onclick="setBg()" class="w-full bg-white/10 py-3 rounded-xl text-sm">Set Background Image</button>
            <button onclick="resetBg()" class="w-full bg-red-500/10 text-red-400 py-2 rounded-xl text-xs">Reset Background</button>
            <button onclick="openAboutBlank()" class="w-full bg-white/10 py-3 rounded-xl text-sm">Open in About:Blank</button>
            <div class="space-y-3 pt-4 border-t border-white/10 flex flex-col">
                <input type="text" id="cloakTitle" placeholder="Tab Title" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg text-sm">
                <input type="text" id="cloakFavicon" placeholder="Favicon URL" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg text-sm">
                <button onclick="applyCloak()" class="w-full bg-accent text-black py-3 px-4 rounded-xl text-sm font-bold shadow-lg hover:brightness-110 transition-all mt-2">Apply Cloak</button>
            </div>
        </div>
    </div>

    <div id="gameModal" class="fixed inset-0 z-[110] hidden bg-black/95 flex flex-col">

            <div class="bg-black rounded-2xl overflow-hidden border border-white/5">

            </div>

            </div>
        </div>
        <div class="h-20 px-8 flex items-center justify-between bg-white/5 backdrop-blur-md">
            <div class="flex items-center gap-4">

            </div>
            <div class="flex items-center gap-8">

                <button onclick="toggleFullscreen()" class="hover:text-accent"><i class="fas fa-expand text-xl"></i></button>

    let currentMode = "games";
    let particlesEnabled = true;
    let currentUrl = "";

    function renderGames(mode = "games", filter = "") {
        currentMode = mode;
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = "";
        let list = games.filter(g => (mode === "apps" ? g.type === "app" : g.type !== "app"));
        if(filter) list = list.filter(g => g.title.toLowerCase().includes(filter.toLowerCase()));

        list.forEach(g => {
            const div = document.createElement('div');
            div.className = "game-card";
            div.onclick = () => openGame(g);
            div.innerHTML = `<img src="${g.thumb}" onerror="this.src='https://via.placeholder.com/150'"><div class="card-title">${g.title}</div>`;
            grid.appendChild(div);
        });
    }

    function openGame(game) {
        currentUrl = game.url;
        document.getElementById('modalTitle').innerText = game.title;
        document.getElementById('modalIcon').src = game.thumb;
        document.getElementById('iframeContainer').innerHTML = `<iframe src="${game.url}" class="w-full h-full border-none" allowfullscreen></iframe>`;
        
        const suggested = document.getElementById('suggestedGames');
        suggested.innerHTML = "";
        [...games].sort(() => 0.5 - Math.random()).slice(0, 6).forEach(s => {
            const d = document.createElement('div');
            d.className = "sidebar-card";
            d.onclick = () => openGame(s);
            d.innerHTML = `<img src="${s.thumb}"><div class="card-title text-[0.6rem]">${s.title}</div>`;
            suggested.appendChild(d);
        });
        document.getElementById('gameModal').classList.remove('hidden');
    }

    function openRandomGame() {
        const playableGames = games.filter(g => g.type !== "app");
        const randomGame = playableGames[Math.floor(Math.random() * playableGames.length)];
        openGame(randomGame);
    }

    function openAboutBlank() {
        const win = window.open('about:blank', '_blank');
        if (win) {
            const doc = win.document;
            const iframe = doc.createElement('iframe');
            iframe.src = window.location.href;
            iframe.style.width = '100vw';
            iframe.style.height = '100vh';
            iframe.style.border = 'none';
            iframe.style.position = 'fixed';
            iframe.style.top = '0';
            iframe.style.left = '0';
            doc.body.style.margin = '0';
            doc.body.appendChild(iframe);
        }
    }

    function toggleInfo() { document.getElementById('infoTab').classList.toggle('hidden'); }
    function openMovies() { const m = games.find(g => g.id === "alg"); if(m) openGame(m); }
    function closeGame() { document.getElementById('gameModal').classList.add('hidden'); document.getElementById('iframeContainer').innerHTML = ""; }
    function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('translate-x-full'); }
    function toggleParticles() { particlesEnabled = !particlesEnabled; document.getElementById('partToggle').innerText = particlesEnabled ? "ON" : "OFF"; }
    function updatePrimary(val) { document.documentElement.style.setProperty('--primary', val); document.documentElement.style.setProperty('--accent', val); localStorage.setItem('user_p_color', val); }
    function setBg() { const url = prompt("Background URL:"); if(url) { document.body.style.backgroundImage = `url('${url}')`; localStorage.setItem('user_bg', url); } }
    function resetBg() { document.body.style.backgroundImage = ""; localStorage.removeItem('user_bg'); }
    function applyCloak() { const t = document.getElementById('cloakTitle').value; const f = document.getElementById('cloakFavicon').value; if(t) document.title = t; if(f) document.getElementById('favicon').href = f; }
    function popOut() { const win = window.open(); const ifr = win.document.createElement('iframe'); win.document.body.style.margin = '0'; ifr.style.width = '100%'; ifr.style.height = '100vh'; ifr.style.border = 'none'; ifr.src = currentUrl; win.document.body.appendChild(ifr); }
    function toggleFullscreen() { const el = document.querySelector('iframe'); if (el.requestFullscreen) el.requestFullscreen(); }

    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let pts = [];
    function initPts() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; pts = Array(40).fill().map(() => ({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2, v:Math.random()*0.5+0.2 })); }
    function draw() {
        if(!particlesEnabled) { ctx.clearRect(0,0,canvas.width,canvas.height); return requestAnimationFrame(draw); }
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary');
        pts.forEach(p => { p.y -= p.v; if(p.y<0) p.y=canvas.height; ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,7); ctx.fill(); });
        requestAnimationFrame(draw);
    }

    window.onload = () => {
        const savedColor = localStorage.getItem('user_p_color');
        if(savedColor) { updatePrimary(savedColor); document.getElementById('primaryPicker').value = savedColor; }
        const sBg = localStorage.getItem('user_bg');
        if(sBg) document.body.style.backgroundImage = `url('${sBg}')`;
        renderGames('games');
        initPts(); draw();
    };

    document.getElementById('searchInput').oninput = (e) => renderGames(currentMode, e.target.value);
    document.addEventListener('keydown', (e) => { if(e.key === "=") window.location.href = "https://cccc-vic.compass.education"; });
</script>
</body>
</html>
